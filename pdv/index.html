<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0E0906"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>PDV — Desmantelo's Burguer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'"/>
  <noscript><link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;800&display=swap"/></noscript>

  <style>
    /* ── TOKENS ── */
    :root{
      --red:#C41A1A;--red-dark:#8B0000;
      --yellow:#F5A623;--gold:#D4880A;
      --black:#0E0906;--surface:#1C1510;--surface2:#2A1F18;
      --border:#3A2E26;--border2:#4A3C32;
      --cream:#F5EDD8;--cream2:#EDE0C4;
      --green:#2d6a1f;--green2:#3a8a28;
      --white:#FFFDF7;
      --text:#E8D9C4;--text2:#A89880;
      --radius:8px;
      --receipt-width:80mm; /* trocar para 58mm se a impressora usada for a de bobina estreita */
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%;-webkit-text-size-adjust:100%}
    body{
      font-family:'Nunito',system-ui,sans-serif;
      background:var(--black);color:var(--text);
      height:100%;overflow:hidden;
      display:flex;flex-direction:column;
    }

    /* ── TOPBAR ── */
    .topbar{
      background:var(--surface);
      border-bottom:2px solid var(--border);
      padding:8px 14px;
      display:flex;align-items:center;gap:10px;
      flex-shrink:0;
    }
    .topbar-logo{
      font-family:'Bebas Neue',cursive;
      font-size:1rem;letter-spacing:2px;
      color:var(--yellow);line-height:1;
    }
    .topbar-logo span{color:var(--red);font-size:.7rem;display:block;letter-spacing:1px;}
    .topbar-divider{width:1px;height:28px;background:var(--border2);flex-shrink:0;}
    .cliente-wrap{flex:1;display:flex;align-items:center;gap:8px;}
    .cliente-label{
      font-family:'Bebas Neue',cursive;font-size:.75rem;
      letter-spacing:2px;color:var(--text2);white-space:nowrap;
    }
    .cliente-input{
      flex:1;max-width:200px;
      background:var(--surface2);border:1.5px solid var(--border2);
      border-radius:6px;padding:5px 10px;
      font-family:'Nunito',sans-serif;font-size:.82rem;
      color:var(--text);outline:none;
      transition:border-color .12s;
    }
    .cliente-input::placeholder{color:var(--text2);}
    .cliente-input:focus{border-color:var(--yellow);}
    .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .topbar-total{
      font-family:'Bebas Neue',cursive;font-size:1.1rem;
      color:var(--yellow);white-space:nowrap;
    }
    .topbar-count{
      font-family:'Bebas Neue',cursive;font-size:.7rem;
      color:var(--text2);letter-spacing:1px;
    }
    .btn-imprimir{
      background:var(--green);color:#fff;
      border:2px solid var(--green2);border-radius:var(--radius);
      padding:7px 14px;font-family:'Bebas Neue',cursive;
      font-size:.9rem;letter-spacing:2px;cursor:pointer;
      white-space:nowrap;
      -webkit-tap-highlight-color:transparent;
      transition:background .12s,opacity .12s;
    }
    .btn-imprimir:hover{background:var(--green2);}
    .btn-imprimir:disabled{opacity:.4;cursor:not-allowed;}
    .btn-imprimir:active{opacity:.8;}
    .btn-novo-pedido{
      background:none;border:1.5px solid var(--border2);
      border-radius:var(--radius);padding:7px 12px;
      font-family:'Bebas Neue',cursive;font-size:.85rem;
      letter-spacing:1px;color:var(--text2);cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      transition:border-color .12s,color .12s;
    }
    .btn-novo-pedido:hover{border-color:var(--red);color:var(--red);}

    /* ── LAYOUT ── */
    .layout{
      flex:1;display:flex;overflow:hidden;
      min-height:0;
    }

    /* ── PAINEL ESQUERDO — PRODUTOS ── */
    .produtos-panel{
      flex:1;display:flex;flex-direction:column;
      overflow:hidden;border-right:2px solid var(--border);
    }

    /* abas de categoria */
    .cat-tabs{
      display:flex;overflow-x:auto;scrollbar-width:none;
      background:var(--surface);border-bottom:2px solid var(--border);
      flex-shrink:0;
    }
    .cat-tabs::-webkit-scrollbar{display:none;}
    .cat-tab{
      flex-shrink:0;background:none;border:none;
      font-family:'Bebas Neue',cursive;font-size:.85rem;
      letter-spacing:2px;color:var(--text2);
      padding:10px 16px;cursor:pointer;
      border-bottom:3px solid transparent;margin-bottom:-2px;
      -webkit-tap-highlight-color:transparent;
      transition:color .12s,border-color .12s;
    }
    .cat-tab.active,.cat-tab:hover{color:var(--yellow);border-bottom-color:var(--yellow);}

    /* busca rápida */
    .search-bar{
      padding:8px 12px;background:var(--surface);
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .search-input{
      width:100%;background:var(--surface2);
      border:1.5px solid var(--border2);border-radius:6px;
      padding:6px 10px;font-family:'Nunito',sans-serif;
      font-size:.82rem;color:var(--text);outline:none;
      transition:border-color .12s;
    }
    .search-input::placeholder{color:var(--text2);}
    .search-input:focus{border-color:var(--yellow);}

    /* lista de produtos */
    .produtos-list{
      flex:1;overflow-y:auto;padding:8px;
      scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
    }
    .produtos-list::-webkit-scrollbar{width:4px;}
    .produtos-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

    /* item de produto */
    .produto-item{
      display:flex;align-items:center;gap:10px;
      padding:9px 10px;border-radius:var(--radius);
      border:1.5px solid var(--border);
      background:var(--surface);
      margin-bottom:6px;
      transition:border-color .1s,background .1s;
    }
    .produto-item:hover{border-color:var(--border2);background:var(--surface2);}
    .produto-info{flex:1;min-width:0;}
    .produto-nome{
      font-family:'Bebas Neue',cursive;font-size:.95rem;
      letter-spacing:1px;color:var(--cream);line-height:1;
    }
    .produto-detalhe{
      font-size:.7rem;color:var(--text2);
      margin-top:2px;line-height:1.3;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .produto-preco{
      font-family:'Bebas Neue',cursive;font-size:1rem;
      color:var(--yellow);white-space:nowrap;flex-shrink:0;
    }
    .btn-add-item{
      background:var(--red);color:var(--yellow);
      border:1.5px solid var(--red-dark);border-radius:6px;
      width:32px;height:32px;font-size:1.2rem;font-weight:800;
      cursor:pointer;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      transition:background .1s,transform .08s;
    }
    .btn-add-item:hover{background:var(--red-dark);}
    .btn-add-item:active{transform:scale(.9);}

    /* sub-header de categoria */
    .cat-label{
      font-family:'Bebas Neue',cursive;font-size:.75rem;
      letter-spacing:3px;color:var(--text2);
      padding:10px 4px 4px;
      border-bottom:1px solid var(--border);
      margin-bottom:6px;
    }

    /* ── PAINEL DIREITO — PEDIDO ── */
    .pedido-panel{
      width:280px;flex-shrink:0;
      display:flex;flex-direction:column;
      overflow:hidden;
    }

    .pedido-header{
      padding:10px 14px;
      background:var(--surface);
      border-bottom:2px solid var(--border);
      flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
    }
    .pedido-title{
      font-family:'Bebas Neue',cursive;font-size:1rem;
      letter-spacing:2px;color:var(--cream);
    }
    .btn-limpar-pedido{
      background:none;border:none;color:var(--text2);
      font-size:.68rem;cursor:pointer;text-decoration:underline;
      font-family:'Nunito',sans-serif;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-limpar-pedido:hover{color:var(--red);}

    .pedido-items{
      flex:1;overflow-y:auto;padding:8px;
      scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
    }
    .pedido-items::-webkit-scrollbar{width:4px;}
    .pedido-items::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

    .pedido-vazio{
      text-align:center;padding:40px 20px;
      color:var(--text2);font-size:.8rem;line-height:1.6;
    }
    .pedido-vazio-icon{font-size:2rem;margin-bottom:8px;display:block;opacity:.4;}

    /* item no pedido */
    .pedido-item{
      display:flex;align-items:flex-start;gap:8px;
      padding:8px 0;
      border-bottom:1px solid var(--border);
    }
    .pedido-item:last-child{border-bottom:none;}
    .pedido-item-info{flex:1;min-width:0;}
    .pedido-item-nome{
      font-family:'Bebas Neue',cursive;font-size:.88rem;
      letter-spacing:1px;color:var(--cream);line-height:1;
    }
    .pedido-item-detalhe{
      font-size:.68rem;color:var(--text2);margin-top:2px;line-height:1.3;
    }
    .pedido-item-preco{
      font-family:'Bebas Neue',cursive;font-size:.88rem;
      color:var(--yellow);white-space:nowrap;flex-shrink:0;
    }
    .btn-rem{
      background:none;border:none;color:var(--border2);
      font-size:.8rem;cursor:pointer;padding:0;flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
      transition:color .1s;line-height:1;margin-top:2px;
    }
    .btn-rem:hover{color:var(--red);}

    /* qty control inline no pedido */
    .qty-ctrl{
      display:flex;align-items:center;gap:4px;margin-top:4px;
    }
    .btn-qty{
      background:var(--surface2);border:1px solid var(--border2);
      border-radius:4px;width:22px;height:22px;
      font-size:.85rem;font-weight:800;
      color:var(--text);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      transition:background .1s;
    }
    .btn-qty:hover{background:var(--border2);}
    .qty-num{
      font-family:'Bebas Neue',cursive;font-size:.9rem;
      color:var(--cream);min-width:18px;text-align:center;
    }

    /* footer do pedido */
    .pedido-footer{
      padding:10px 14px;
      background:var(--surface);
      border-top:2px solid var(--border);
      flex-shrink:0;
    }
    .pedido-subtotais{margin-bottom:8px;}
    .pedido-linha{
      display:flex;justify-content:space-between;
      font-size:.75rem;color:var(--text2);margin-bottom:3px;
    }
    .pedido-total-linha{
      display:flex;justify-content:space-between;
      align-items:baseline;
      border-top:1px solid var(--border2);padding-top:6px;margin-top:4px;
    }
    .pedido-total-label{
      font-family:'Bebas Neue',cursive;font-size:.9rem;
      letter-spacing:2px;color:var(--cream);
    }
    .pedido-total-valor{
      font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--yellow);
    }
    .btn-imprimir-footer{
      display:block;width:100%;margin-top:10px;
      padding:11px;background:var(--green);color:#fff;
      border:2px solid var(--green2);border-radius:var(--radius);
      font-family:'Bebas Neue',cursive;font-size:1rem;
      letter-spacing:3px;cursor:pointer;
      transition:background .12s,opacity .12s;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-imprimir-footer:hover{background:var(--green2);}
    .btn-imprimir-footer:disabled{opacity:.4;cursor:not-allowed;}

    /* ── ÁREA DE IMPRESSÃO — invisível na tela, só aparece no @media print ── */
    #printArea{display:none;}
    @media print{
      body > *:not(#printArea){display:none !important;}
      #printArea{
        display:block !important;
        width:var(--receipt-width);
        font-family:'Courier New',monospace;
        font-size:11px;white-space:pre-wrap;
      }
    }

    /* ── FORMA DE PAGAMENTO ── */
    .pill-row{display:flex;gap:6px;margin-bottom:10px;}
    .btn-pill{
      flex:1;padding:8px 4px;background:var(--surface2);
      border:1.5px solid var(--border2);border-radius:var(--radius);
      font-family:'Bebas Neue',cursive;font-size:.72rem;
      letter-spacing:1px;color:var(--text2);cursor:pointer;
      transition:border-color .12s,color .12s,background .12s;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-pill.selected{
      border-color:var(--yellow);color:var(--yellow);background:#2a2010;
    }

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:80px;left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--surface2);color:var(--yellow);
      border:1.5px solid var(--border2);
      padding:7px 16px;border-radius:20px;
      font-family:'Bebas Neue',cursive;font-size:.85rem;letter-spacing:1px;
      z-index:300;white-space:nowrap;pointer-events:none;opacity:0;
      transition:opacity .2s,transform .2s;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ── DRAWER BURGER PDV ── */
    .pdv-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.75);
      z-index:110;opacity:0;pointer-events:none;transition:opacity .2s;
    }
    .pdv-overlay.open{opacity:1;pointer-events:all;}
    .pdv-drawer{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--surface);border-top:3px solid var(--red);
      border-radius:16px 16px 0 0;z-index:120;
      max-height:85vh;display:flex;flex-direction:column;
      transform:translateY(100%);
      transition:transform .25s cubic-bezier(.34,1.56,.64,1);
      will-change:transform;
      padding-bottom:env(safe-area-inset-bottom);
    }
    .pdv-drawer.open{transform:translateY(0);}
    .pdv-drawer-handle{
      width:36px;height:3px;background:var(--border2);
      border-radius:2px;margin:8px auto 0;flex-shrink:0;
    }
    .pdv-drawer-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 16px 8px;border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .pdv-drawer-nome{
      font-family:'Bebas Neue',cursive;font-size:1.2rem;
      letter-spacing:2px;color:var(--yellow);
    }
    .pdv-drawer-close{
      background:none;border:1.5px solid var(--border2);
      border-radius:50%;width:26px;height:26px;
      font-size:.8rem;cursor:pointer;color:var(--text2);
      display:flex;align-items:center;justify-content:center;
    }
    .pdv-drawer-body{overflow-y:auto;flex:1;padding:10px 16px;}
    .pdv-section-label{
      font-family:'Bebas Neue',cursive;font-size:.85rem;letter-spacing:2px;
      color:var(--text2);margin:8px 0 6px;
      display:flex;align-items:center;gap:6px;
    }
    .pdv-section-label::after{content:'';flex:1;height:1px;background:var(--border);}
    .pdv-tier-row{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
    .pdv-tier-opt{
      display:flex;align-items:center;gap:8px;
      background:var(--surface2);border:1.5px solid var(--border);
      border-radius:8px;padding:8px 10px;cursor:pointer;
      transition:border-color .1s,background .1s;
      -webkit-tap-highlight-color:transparent;
    }
    .pdv-tier-opt.selected{border-color:var(--yellow);background:#2a2010;}
    .pdv-tier-radio{
      width:14px;height:14px;border-radius:50%;
      border:2px solid var(--border2);flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
    }
    .pdv-tier-opt.selected .pdv-tier-radio{border-color:var(--yellow);background:var(--yellow);}
    .pdv-tier-label{flex:1;font-size:.82rem;font-weight:700;color:var(--text);}
    .pdv-tier-preco{font-family:'Bebas Neue',cursive;font-size:.95rem;color:var(--yellow);}
    .pdv-adds-grid{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
    .pdv-add-opt{
      display:flex;align-items:center;gap:8px;
      background:var(--surface2);border:1.5px solid var(--border);
      border-radius:8px;padding:7px 10px;cursor:pointer;
      transition:border-color .1s,background .1s;
      -webkit-tap-highlight-color:transparent;
    }
    .pdv-add-opt.selected{border-color:var(--gold);background:#22180a;}
    .pdv-add-check{
      width:14px;height:14px;border-radius:3px;
      border:2px solid var(--border2);flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:.65rem;background:var(--surface);
    }
    .pdv-add-opt.selected .pdv-add-check{background:var(--gold);border-color:var(--gold);color:var(--black);}
    .pdv-add-nome{flex:1;font-size:.8rem;font-weight:700;color:var(--text);}
    .pdv-add-preco{font-size:.75rem;color:var(--green2);font-weight:800;}
    .pdv-obs-input{
      width:100%;padding:8px 10px;
      background:var(--surface2);border:1.5px solid var(--border);
      border-radius:8px;font-family:'Nunito',sans-serif;font-size:.8rem;
      color:var(--text);outline:none;resize:none;
      transition:border-color .12s;
    }
    .pdv-obs-input:focus{border-color:var(--yellow);}
    .pdv-obs-input::placeholder{color:var(--text2);}
    .pdv-drawer-footer{
      padding:10px 16px;border-top:1px solid var(--border);
      flex-shrink:0;display:flex;align-items:center;gap:10px;
    }
    .pdv-total-wrap{display:flex;flex-direction:column;}
    .pdv-total-label{font-size:.62rem;color:var(--text2);font-weight:600;letter-spacing:1px;}
    .pdv-total-val{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:var(--yellow);}
    .btn-pdv-confirmar{
      flex:1;padding:10px;background:var(--red);color:var(--yellow);
      border:2px solid var(--red-dark);border-radius:8px;
      font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:3px;
      cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.4);
      -webkit-tap-highlight-color:transparent;
      transition:background .1s;
    }
    .btn-pdv-confirmar:hover{background:var(--red-dark);}
    .btn-pdv-confirmar:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.4);}
    .btn-pdv-confirmar:disabled{opacity:.4;cursor:not-allowed;}
    @media(max-width:600px){
      body{overflow:auto;}
      .layout{flex-direction:column;overflow:visible;}
      .produtos-panel{border-right:none;border-bottom:2px solid var(--border);}
      .pedido-panel{width:100%;}
      .topbar{flex-wrap:wrap;gap:6px;}
      .cliente-input{max-width:100%;}
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">
    PDV
    <span>DESMANTELO'S BURGUER</span>
  </div>
  <div class="topbar-divider"></div>
  <div class="cliente-wrap">
    <span class="cliente-label">CLIENTE</span>
    <input class="cliente-input" id="clienteInput" type="text"
      placeholder="Mesa, nome ou nº do pedido…" autocomplete="off"/>
  </div>
  <div class="topbar-right">
    <div>
      <div class="topbar-total" id="topbarTotal">R$ 0,00</div>
      <div class="topbar-count" id="topbarCount">0 ITENS</div>
    </div>
    <button class="btn-novo-pedido" onclick="novoPedido()">🗑 NOVO</button>
    <button class="btn-imprimir" id="btnImprimirTop" onclick="imprimirCupom()" disabled>
      🖨 IMPRIMIR
    </button>
  </div>
</div>

<!-- LAYOUT PRINCIPAL -->
<div class="layout">

  <!-- PRODUTOS -->
  <div class="produtos-panel">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="search-bar">
      <input class="search-input" id="searchInput" type="search"
        placeholder="Buscar item…" autocomplete="off" oninput="filtrar(this.value)"/>
    </div>
    <div class="produtos-list" id="produtosList"></div>
  </div>

  <!-- PEDIDO -->
  <div class="pedido-panel">
    <div class="pedido-header">
      <span class="pedido-title">🧾 PEDIDO</span>
      <button class="btn-limpar-pedido" onclick="novoPedido()">limpar tudo</button>
    </div>
    <div class="pedido-items" id="pedidoItems">
      <div class="pedido-vazio" id="pedidoVazio">
        <span class="pedido-vazio-icon">🧾</span>
        Nenhum item ainda.<br/>Toque em + para adicionar.
      </div>
    </div>
    <div class="pedido-footer">
      <div class="pedido-subtotais" id="pedidoSubtotais"></div>
      <div class="pedido-total-linha">
        <span class="pedido-total-label">TOTAL</span>
        <span class="pedido-total-valor" id="pedidoTotal">R$ 0,00</span>
      </div>
      <div class="pill-row" id="entregaRow">
        <button class="btn-pill" data-valor="delivery" onclick="selecionarEntrega('delivery')">🛵 DELIVERY</button>

<!-- ÁREA DE IMPRESSÃO — só fica visível durante a impressão (@media print) -->
<pre id="printArea"></pre>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   ⚙️  DADOS — substitua por import ../cardapio.js
       quando a estrutura de pastas for criada
   ═══════════════════════════════════════════ */
const ADICIONAIS=[
  {id:"bacon",    nome:"Bacon",                     preco:4.00},
  {id:"blend",    nome:"Blend de carne 130g",       preco:7.00},
  {id:"cheddar",  nome:"Queijo cheddar ou ovo",     preco:2.00},
  {id:"cebola",   nome:"Cebola caramelizada",       preco:3.00},
  {id:"molched",  nome:"Molho de cheddar artesanal",preco:2.00},
  {id:"molesp",   nome:"Molho especial",            preco:3.00},
  {id:"barbecue", nome:"Molho barbecue",            preco:2.00},
  {id:"cream",    nome:"Cream cheese",              preco:3.00},
  {id:"geleia",   nome:"Geleia de pimenta",         preco:3.00},
];

const CARDAPIO=[
  {id:1, nome:"Xodozinho",      preco:{burger:16.99,combo:22.00,completo:28.00}, descricao:"Blend 100g, cheddar, molho especial"},
  {id:2, nome:"Arretado",       preco:{burger:18.99,combo:24.00,completo:30.00}, descricao:"Blend 130g, cheddar, molho especial, salada"},
  {id:3, nome:"Lampião",        preco:{burger:21.99,combo:27.00,completo:33.00}, descricao:"Blend 130g, cheddar, bacon, molho especial"},
  {id:4, nome:"Matuto",         preco:{burger:22.99,combo:28.00,completo:34.00}, descricao:"Blend 160g, cheddar 2x, creme cheddar, cebola"},
  {id:5, nome:"Vixe Maria",     preco:{burger:23.99,combo:29.00,completo:35.00}, descricao:"Blend 160g, coalho, doce de leite, bacon"},
  {id:6, nome:"Maria Bonita",   preco:{burger:25.99,combo:31.00,completo:37.00}, descricao:"2x blend 130g, cheddar 2x, molho especial"},
  {id:7, nome:"Rei do Cangaço", preco:{burger:28.99,combo:34.00,completo:40.00}, descricao:"Blend 130g, cheddar, costela, cream cheese"},
  {id:8, nome:"Desmantelado",   preco:{burger:28.99,combo:34.00,completo:40.00}, descricao:"2x blend 130g, cheddar 2x, bacon"},
];

const COMBOS=[
  {id:"c1", nome:"Combo Lampião e Maria Bonita", preco:59.99, detalhe:"2 Lampião + Batata G + Refri 1L"},
  {id:"c2", nome:"Combo Cangaceiros",            preco:96.99, detalhe:"4 Arretado + Batata GG + Refri 2L"},
];

const BATATAS=[
  {id:"bf-p", nome:"Batata Frita P",        preco:7.00,  detalhe:"Batata frita"},
  {id:"bf-g", nome:"Batata Frita G",        preco:10.00, detalhe:"Batata frita"},
  {id:"bt-m", nome:"Batata Turbinada M",    preco:12.00, detalhe:"Batata + cheddar + farofa bacon"},
  {id:"bt-g", nome:"Batata Turbinada G",    preco:20.00, detalhe:"Batata + cheddar + farofa bacon"},
];

const BEBIDAS=[
  {id:"b1", nome:"Refrigerante lata",    preco:6.00},
  {id:"b2", nome:"Refrigerante 250ml",   preco:4.00},
  {id:"b3", nome:"Antartica 1L",         preco:10.00},
  {id:"b4", nome:"Coca-Cola 1L",         preco:12.00},
  {id:"b5", nome:"Água",                preco:2.00},
  {id:"b6", nome:"Água c/ gás",          preco:4.00},
  {id:"b7", nome:"H²O Limoneto",         preco:6.00},
  {id:"b8", nome:"Schweppes",            preco:6.00},
];

/* categorias para as abas */
const CATEGORIAS=[
  {id:"burgers",  label:"🍔 BURGERS",  itens:()=>CARDAPIO.map(b=>({
      id:`burger-${b.id}`, nome:b.nome,
      preco:b.preco.burger, detalhe:b.descricao,
      _burger:b
    }))
  },
  {id:"combos",   label:"🔥 COMBOS",   itens:()=>COMBOS.map(c=>({id:c.id,nome:c.nome,preco:c.preco,detalhe:c.detalhe,_combo:c}))},
  {id:"batatas",  label:"🍟 BATATAS",  itens:()=>BATATAS.map(b=>({id:b.id,nome:b.nome,preco:b.preco,detalhe:b.detalhe}))},
  {id:"bebidas",  label:"🥤 BEBIDAS",  itens:()=>BEBIDAS.map(b=>({id:b.id,nome:b.nome,preco:b.preco,detalhe:""}))},
  {id:"adicionais",label:"➕ ADICIONAIS",itens:()=>ADICIONAIS.map(a=>({id:`add-${a.id}`,nome:a.nome,preco:a.preco,detalhe:"Adicional avulso"}))},
];

/* ═══════════════════════════════════════════
   🛒  ESTADO
   ═══════════════════════════════════════════ */
let pedido=[];
let catAtiva="burgers";
let formaPagamento=null;
let entregaTipo=null;

const PONTOS=[
  {id:"mal-passada", label:"Mal passada"},
  {id:"ao-ponto",    label:"Ao ponto"},
  {id:"bem-passada", label:"Bem passada"},
];

// estado do drawer (compartilhado entre burger e combo)
let drawerMode="burger"; // "burger" | "combo"
let drawerBurgerId=null;
let drawerTierIdx=0;
let drawerAdds=new Set();
let drawerPonto=null;
let drawerComboId=null;
let drawerComboPonto=null;

/* ═══════════════════════════════════════════
   🖼️  RENDER
   ═══════════════════════════════════════════ */
function fmt(v){return "R$ "+v.toFixed(2).replace(".",",")}
function fmtN(v){return v.toFixed(2).replace(".",",")}

function renderAbas(){
  const tabs=document.getElementById("catTabs");
  tabs.innerHTML=CATEGORIAS.map(c=>`
    <button class="cat-tab${c.id===catAtiva?" active":""}"
      onclick="trocarCat('${c.id}')">${c.label}
    </button>`).join("");
}

function trocarCat(id){
  catAtiva=id;
  renderAbas();
  document.getElementById("searchInput").value="";
  renderProdutos();
}

function renderProdutos(filtro=""){
  const cat=CATEGORIAS.find(c=>c.id===catAtiva);
  let itens=cat.itens();
  if(filtro){
    const q=filtro.toLowerCase();
    itens=itens.filter(i=>i.nome.toLowerCase().includes(q)||i.detalhe?.toLowerCase().includes(q));
  }
  const list=document.getElementById("produtosList");
  if(!itens.length){
    list.innerHTML=`<div style="padding:24px;text-align:center;color:var(--text2);font-size:.8rem;">Nenhum item encontrado.</div>`;
    return;
  }
  const frag=document.createDocumentFragment();

  if(catAtiva==="burgers"&&!filtro){
    CARDAPIO.forEach(b=>{
      const label=document.createElement("div");
      label.className="cat-label";
      label.textContent=b.nome.toUpperCase();
      frag.appendChild(label);
      frag.appendChild(criarItemEl({
        id:`burger-${b.id}`, nome:b.nome,
        preco:b.preco.burger, detalhe:b.descricao,
        _burger:b
      }));
    });
  } else {
    itens.forEach(i=>frag.appendChild(criarItemEl(i)));
  }
  list.innerHTML="";
  list.appendChild(frag);
}

function criarItemEl(item){
  const div=document.createElement("div");
  div.className="produto-item";
  // burgers e combos abrem drawer (precisam de ponto da carne); demais adicionam direto
  const onclick=item._burger
    ?`abrirDrawerBurger(${item._burger.id})`
    :item._combo
      ?`abrirDrawerCombo('${item._combo.id}')`
      :`adicionarItem(${JSON.stringify(item)})`;
  div.innerHTML=`
    <div class="produto-info">
      <div class="produto-nome">${item.nome}</div>
      ${item.detalhe&&!item._burger&&!item._combo?`<div class="produto-detalhe">${item.detalhe}</div>`:""}
    </div>
    <div class="produto-preco">${fmt(item.preco)}</div>
    <button class="btn-add-item" onclick="${onclick}">+</button>`;
  return div;
}

function filtrar(v){renderProdutos(v);}

/* ═══════════════════════════════════════════
   🍔  DRAWER DE BURGER
   ═══════════════════════════════════════════ */
function abrirDrawerBurger(bid){
  drawerMode="burger";
  drawerBurgerId=bid;
  drawerTierIdx=0;
  drawerAdds=new Set();
  drawerPonto=null;
  const b=CARDAPIO.find(x=>x.id===bid);
  document.getElementById("pdvDrawerNome").textContent=b.nome;

  const tiers=[
    {label:"Só o burger",              preco:b.preco.burger},
    {label:"Burger + Refri lata",      preco:b.preco.combo},
    {label:"Burger + Refri + Batata P",preco:b.preco.completo},
  ];

  document.getElementById("pdvDrawerBody").innerHTML=`
    <div class="pdv-section-label">OPÇÃO</div>
    <div class="pdv-tier-row">
      ${tiers.map((t,i)=>`
        <div class="pdv-tier-opt${i===0?" selected":""}" id="pdvTier-${i}"
          onclick="selecionarTier(${i})">
          <div class="pdv-tier-radio"></div>
          <span class="pdv-tier-label">${t.label}</span>
          <span class="pdv-tier-preco">R$&nbsp;${fmtN(t.preco)}</span>
        </div>`).join("")}
    </div>
    <div class="pdv-section-label">PONTO DA CARNE</div>
    <div class="pdv-tier-row" id="pdvPontoRow">
      ${PONTOS.map(p=>`
        <div class="pdv-tier-opt" id="pdvPonto-${p.id}" onclick="selecionarPonto('${p.id}')">
          <div class="pdv-tier-radio"></div>
          <span class="pdv-tier-label">${p.label}</span>
        </div>`).join("")}
    </div>
    <div class="pdv-section-label">ADICIONAIS</div>
    <div class="pdv-adds-grid">
      ${ADICIONAIS.map(a=>`
        <div class="pdv-add-opt" id="pdvAdd-${a.id}" onclick="toggleAddPdv('${a.id}')">
          <div class="pdv-add-check" id="pdvChk-${a.id}"></div>
          <span class="pdv-add-nome">${a.nome}</span>
          <span class="pdv-add-preco">+R$&nbsp;${fmtN(a.preco)}</span>
        </div>`).join("")}
    </div>
    <div class="pdv-section-label">OBSERVAÇÃO</div>
    <textarea class="pdv-obs-input" id="pdvObs" rows="2"
      placeholder="Ex: sem cebola…"></textarea>
    <div style="height:8px"></div>`;

  atualizarTotalDrawer();
  document.getElementById("btnPdvConfirmar").disabled=true;
  document.getElementById("pdvDrawer").classList.add("open");
  document.getElementById("pdvOverlay").classList.add("open");
  document.body.style.overflow="hidden";
}

function selecionarPonto(pid){
  drawerPonto=pid;
  PONTOS.forEach(p=>{
    document.getElementById(`pdvPonto-${p.id}`)?.classList.toggle("selected",p.id===pid);
  });
  document.getElementById("btnPdvConfirmar").disabled=false;
}

function fecharDrawerBurger(){
  document.getElementById("pdvDrawer").classList.remove("open");
  document.getElementById("pdvOverlay").classList.remove("open");
  document.body.style.overflow="";
}

function selecionarTier(idx){
  drawerTierIdx=idx;
  for(let i=0;i<3;i++)
    document.getElementById(`pdvTier-${i}`)?.classList.toggle("selected",i===idx);
  atualizarTotalDrawer();
}

function toggleAddPdv(aid){
  drawerAdds.has(aid)?drawerAdds.delete(aid):drawerAdds.add(aid);
  const sel=drawerAdds.has(aid);
  document.getElementById(`pdvAdd-${aid}`)?.classList.toggle("selected",sel);
  const chk=document.getElementById(`pdvChk-${aid}`);
  if(chk) chk.textContent=sel?"✓":"";
  atualizarTotalDrawer();
}

function atualizarTotalDrawer(){
  const b=CARDAPIO.find(x=>x.id===drawerBurgerId);
  if(!b)return;
  const tierPrecos=[b.preco.burger,b.preco.combo,b.preco.completo];
  const addsTotal=[...drawerAdds].reduce((s,aid)=>{
    const a=ADICIONAIS.find(x=>x.id===aid);return s+(a?a.preco:0);
  },0);
  document.getElementById("pdvTotalItem").textContent=fmt(tierPrecos[drawerTierIdx]+addsTotal);
}

function confirmarBurger(){
  const b=CARDAPIO.find(x=>x.id===drawerBurgerId);
  const tierPrecos=[b.preco.burger,b.preco.combo,b.preco.completo];
  const tierLabels=["Só o burger","Burger + Refri lata","Burger + Refri + Batata P"];
  const adds=ADICIONAIS.filter(a=>drawerAdds.has(a.id));
  const addsTotal=adds.reduce((s,a)=>s+a.preco,0);
  const obs=document.getElementById("pdvObs")?.value.trim()||"";
  const pontoLabel=PONTOS.find(p=>p.id===drawerPonto).label;
  const tier=`${tierLabels[drawerTierIdx]} · Ponto: ${pontoLabel}`;
  const preco=tierPrecos[drawerTierIdx]+addsTotal;

  pedido.push({
    uid:Date.now()+Math.random(),
    id:`burger-${b.id}-${drawerTierIdx}`,
    nome:b.nome,
    tier,
    adds,
    obs,
    preco,
    preco_total:preco,
    qty:1,
    _tipo:"burger"
  });

  fecharDrawerBurger();
  renderPedido();
  showToast(`${b.nome} adicionado ✓`);
}

function confirmarDrawerAtivo(){
  drawerMode==="combo" ? confirmarCombo() : confirmarBurger();
}

/* ═══════════════════════════════════════════
   🔥  DRAWER DE COMBO (reaproveita o drawer do burger)
   ═══════════════════════════════════════════ */
function abrirDrawerCombo(cid){
  drawerMode="combo";
  drawerComboId=cid;
  drawerComboPonto=null;
  const c=COMBOS.find(x=>x.id===cid);
  document.getElementById("pdvDrawerNome").textContent=c.nome;

  document.getElementById("pdvDrawerBody").innerHTML=`
    <div class="pdv-section-label">COMPOSIÇÃO</div>
    <div style="font-size:.8rem;color:var(--text2);margin-bottom:10px;">${c.detalhe}</div>
    <div class="pdv-section-label">PONTO DA CARNE</div>
    <div class="pdv-tier-row" id="pdvComboPontoRow">
      ${PONTOS.map(p=>`
        <div class="pdv-tier-opt" id="pdvComboPonto-${p.id}" onclick="selecionarPontoCombo('${p.id}')">
          <div class="pdv-tier-radio"></div>
          <span class="pdv-tier-label">${p.label}</span>
        </div>`).join("")}
    </div>
    <div class="pdv-section-label">OBSERVAÇÃO</div>
    <textarea class="pdv-obs-input" id="pdvComboObs" rows="2"
      placeholder="Ex: dividir o ponto entre as unidades…"></textarea>
    <div style="height:8px"></div>`;

  document.getElementById("pdvTotalItem").textContent=fmt(c.preco);
  document.getElementById("btnPdvConfirmar").disabled=true;
  document.getElementById("pdvDrawer").classList.add("open");
  document.getElementById("pdvOverlay").classList.add("open");
  document.body.style.overflow="hidden";
}

function selecionarPontoCombo(pid){
  drawerComboPonto=pid;
  PONTOS.forEach(p=>{
    document.getElementById(`pdvComboPonto-${p.id}`)?.classList.toggle("selected",p.id===pid);
  });
  document.getElementById("btnPdvConfirmar").disabled=false;
}

function confirmarCombo(){
  const c=COMBOS.find(x=>x.id===drawerComboId);
  const pontoLabel=PONTOS.find(p=>p.id===drawerComboPonto).label;
  const obs=document.getElementById("pdvComboObs")?.value.trim()||"";

  pedido.push({
    uid:Date.now()+Math.random(),
    id:c.id,
    nome:c.nome,
    detalhe:c.detalhe,
    ponto:pontoLabel,
    obs,
    preco:c.preco,
    preco_total:c.preco,
    qty:1,
    _tipo:"combo"
  });

  fecharDrawerBurger();
  renderPedido();
  showToast(`${c.nome} adicionado ✓`);
}

/* ═══════════════════════════════════════════
   ➕  ADICIONAR ITENS SIMPLES (não-burger)
   ═══════════════════════════════════════════ */
function adicionarItem(item){
  const existe=pedido.find(p=>p.id===item.id&&!p._tipo);
  if(existe){
    existe.qty++;
    existe.preco_total=existe.preco*existe.qty;
  } else {
    pedido.push({
      uid:Date.now()+Math.random(),
      id:item.id,
      nome:item.nome,
      preco:item.preco,
      preco_total:item.preco,
      detalhe:item.detalhe||"",
      qty:1
    });
  }
  renderPedido();
  showToast(`${item.nome} ✓`);
}

function alterarQty(uid,delta){
  const item=pedido.find(p=>p.uid==uid);
  if(!item)return;
  item.qty+=delta;
  if(item.qty<=0){
    pedido=pedido.filter(p=>p.uid!=uid);
  } else {
    item.preco_total=item.preco*item.qty;
  }
  renderPedido();
}

function removerItem(uid){
  pedido=pedido.filter(p=>p.uid!=uid);
  renderPedido();
}

function novoPedido(){
  pedido=[];
  formaPagamento=null;
  entregaTipo=null;
  document.getElementById("clienteInput").value="";
  document.querySelectorAll(".btn-pill").forEach(b=>b.classList.remove("selected"));
  renderPedido();
}

/* ═══════════════════════════════════════════
   🛵  ENTREGA
   ═══════════════════════════════════════════ */
function selecionarEntrega(valor){
  entregaTipo=valor;
  document.querySelectorAll("#entregaRow .btn-pill").forEach(b=>{
    b.classList.toggle("selected",b.dataset.valor===valor);
  });
  atualizarBotoesImprimir();
}

/* ═══════════════════════════════════════════
   💳  FORMA DE PAGAMENTO
   ═══════════════════════════════════════════ */
function selecionarPagamento(forma){
  formaPagamento=forma;
  document.querySelectorAll("#pagamentoRow .btn-pill").forEach(b=>{
    b.classList.toggle("selected",b.dataset.forma===forma);
  });
  atualizarBotoesImprimir();
}

function atualizarBotoesImprimir(){
  const habilitado=pedido.length>0&&!!formaPagamento&&!!entregaTipo;
  document.getElementById("btnImprimirTop").disabled=!habilitado;
  document.getElementById("btnImprimirFooter").disabled=!habilitado;
}

/* ═══════════════════════════════════════════
   🧾  RENDER PEDIDO
   ═══════════════════════════════════════════ */
function renderPedido(){
  const container=document.getElementById("pedidoItems");
  const vazio=document.getElementById("pedidoVazio");
  const total=pedido.reduce((s,i)=>s+i.preco_total,0);

  atualizarBotoesImprimir();

  const qtdTotal=pedido.reduce((s,i)=>s+i.qty,0);
  document.getElementById("topbarTotal").textContent=fmt(total);
  document.getElementById("topbarCount").textContent=`${qtdTotal} ${qtdTotal===1?"ITEM":"ITENS"}`;
  document.getElementById("pedidoTotal").textContent=fmt(total);

  if(!pedido.length){
    container.innerHTML="";
    vazio&&container.appendChild(vazio);
    vazio&&(vazio.style.display="");
    document.getElementById("pedidoSubtotais").innerHTML="";
    return;
  }
  vazio&&(vazio.style.display="none");

  const frag=document.createDocumentFragment();
  pedido.forEach(item=>{
    const div=document.createElement("div");
    div.className="pedido-item";
    // linha de detalhe: tier para burgers, composição+ponto para combos, detalhe simples para o resto
    const detalheHtml=item._tipo==="burger"
      ?`<div class="pedido-item-detalhe">${item.tier}${item.adds?.length?" · +"+item.adds.map(a=>a.nome).join(", "):""}${item.obs?" · "+item.obs:""}</div>`
      :item._tipo==="combo"
        ?`<div class="pedido-item-detalhe">${item.detalhe} · Ponto: ${item.ponto}${item.obs?" · "+item.obs:""}</div>`
        :item.detalhe?`<div class="pedido-item-detalhe">${item.detalhe}</div>`:"";
    div.innerHTML=`
      <div class="pedido-item-info">
        <div class="pedido-item-nome">${item.nome}${item.qty>1?` ×${item.qty}`:""}</div>
        ${detalheHtml}
        <div class="qty-ctrl">
          <button class="btn-qty" onclick="alterarQty(${item.uid},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="btn-qty" onclick="alterarQty(${item.uid},1)">+</button>
        </div>
      </div>
      <div class="pedido-item-preco">${fmt(item.preco_total)}</div>
      <button class="btn-rem" onclick="removerItem(${item.uid})">✕</button>`;
    frag.appendChild(div);
  });
  container.innerHTML="";
  container.appendChild(frag);

  const sub=document.getElementById("pedidoSubtotais");
  const cats={burgers:0,combos:0,batatas:0,bebidas:0,outros:0};
  pedido.forEach(i=>{
    if(i.id.startsWith("burger"))cats.burgers+=i.preco_total;
    else if(i.id.startsWith("c"))cats.combos+=i.preco_total;
    else if(i.id.startsWith("bf")||i.id.startsWith("bt"))cats.batatas+=i.preco_total;
    else if(i.id.startsWith("b"))cats.bebidas+=i.preco_total;
    else cats.outros+=i.preco_total;
  });
  sub.innerHTML=Object.entries(cats)
    .filter(([,v])=>v>0)
    .map(([k,v])=>`
      <div class="pedido-linha">
        <span>${{burgers:"🍔 Burgers",combos:"🔥 Combos",batatas:"🍟 Batatas",bebidas:"🥤 Bebidas",outros:"➕ Outros"}[k]}</span>
        <span>R$ ${fmtN(v)}</span>
      </div>`).join("");
}

/* ═══════════════════════════════════════════
   🖨️  IMPRESSÃO — cupom sem largura fixa
   ═══════════════════════════════════════════ */
function gerarCupom(){
  const cliente=document.getElementById("clienteInput").value.trim();
  const agora=new Date();
  const dia=agora.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"});
  const hora=agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

  let c="";
  c+="DESMANTELO'S BURGUER\n";
  c+="Hamburguer Artesanal na Brasa\n";
  c+="(81) 9.8669-0346\n";
  c+="---\n";
  c+=`${dia}  ${hora}\n`;
  if(cliente) c+=`Cliente: ${cliente}\n`;
  const entregaLabel={delivery:"Delivery",retirada:"Retirada"}[entregaTipo]||"";
  if(entregaLabel) c+=`Entrega: ${entregaLabel}\n`;
  c+="---\n";

  pedido.forEach((i,n)=>{
    const qtd=i.qty>1?`${i.qty}x `:"";
    if(i._tipo==="burger"){
      // linha principal: nome + opção + preço
      c+=`${qtd}${i.nome} (${i.tier})  R$ ${fmtN(i.preco_total)}\n`;
      // adicionais atrelados
      if(i.adds?.length) c+=`  + ${i.adds.map(a=>a.nome).join(", ")}\n`;
      // observação
      if(i.obs) c+=`  Obs: ${i.obs}\n`;
    } else if(i._tipo==="combo"){
      // combo tem burger na composição — cozinha precisa saber o quê preparar e o ponto
      c+=`${qtd}${i.nome}  R$ ${fmtN(i.preco_total)}\n`;
      c+=`  ${i.detalhe}\n`;
      c+=`  Ponto: ${i.ponto}\n`;
      if(i.obs) c+=`  Obs: ${i.obs}\n`;
    } else {
      c+=`${qtd}${i.nome}  R$ ${fmtN(i.preco_total)}\n`;
      // remove detalhe do cupom para não-burgers/combos (desnecessário na cozinha)
    }
  });

  const total=pedido.reduce((s,i)=>s+i.preco_total,0);
  c+="---\n";
  c+=`TOTAL  R$ ${fmtN(total)}\n`;
  const pagLabel={dinheiro:"Dinheiro",pix:"Pix",cartao:"Cartão"}[formaPagamento]||"";
  if(pagLabel) c+=`Pagamento: ${pagLabel}\n`;
  c+="---\n";
  c+="Obrigado!\n";
  c+="@desmantelosburguer\n";
  return c;
}

function imprimirCupom(){
  if(!pedido.length||!formaPagamento)return;
  document.getElementById("printArea").textContent=gerarCupom();
  window.print();
}

/* ═══════════════════════════════════════════
   🍞  TOAST
   ═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

renderAbas();
renderProdutos();
renderPedido();
</script>
