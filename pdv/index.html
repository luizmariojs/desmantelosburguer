<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0E0906"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>PDV — Desmantelo's Burguer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'"/>
  <noscript><link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;800&display=swap"/></noscript>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">
    PDV
    <span>DESMANTELO'S BURGUER</span>
  </div>
  <div class="topbar-divider"></div>
  <div class="cliente-wrap">
    <span class="cliente-label">CLIENTE</span>
    <input class="cliente-input" id="clienteInput" type="text"
      placeholder="Mesa, nome ou nº do pedido…" autocomplete="off"/>
  </div>
  <div class="topbar-right">
    <div>
      <div class="topbar-total" id="topbarTotal">R$ 0,00</div>
      <div class="topbar-count" id="topbarCount">0 ITENS</div>
    </div>
    <button class="btn-novo-pedido" onclick="novoPedido()">🗑 NOVO</button>
    <button class="btn-imprimir" id="btnImprimirTop" onclick="imprimirCupom()" disabled>
      🖨 IMPRIMIR
    </button>
  </div>
</div>

<!-- LAYOUT PRINCIPAL -->
<div class="layout">

  <!-- PRODUTOS -->
  <div class="produtos-panel">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="search-bar">
      <input class="search-input" id="searchInput" type="search"
        placeholder="Buscar item…" autocomplete="off" oninput="filtrar(this.value)"/>
    </div>
    <div class="produtos-list" id="produtosList"></div>
  </div>

  <!-- PEDIDO -->
  <div class="pedido-panel">
    <div class="pedido-header">
      <span class="pedido-title">🧾 PEDIDO</span>
      <button class="btn-limpar-pedido" onclick="novoPedido()">limpar tudo</button>
    </div>
    <div class="pedido-items" id="pedidoItems">
      <div class="pedido-vazio" id="pedidoVazio">
        <span class="pedido-vazio-icon">🧾</span>
        Nenhum item ainda.<br/>Toque em + para adicionar.
      </div>
    </div>
    <div class="pedido-footer">
      <div class="pedido-subtotais" id="pedidoSubtotais"></div>
      <div class="pedido-total-linha">
        <span class="pedido-total-label">TOTAL</span>
        <span class="pedido-total-valor" id="pedidoTotal">R$ 0,00</span>
      </div>
      <div class="pill-row" id="entregaRow">
        <button class="btn-pill" data-valor="delivery" onclick="selecionarEntrega('delivery')">🛵 DELIVERY</button>
        <button class="btn-pill" data-valor="retirada" onclick="selecionarEntrega('retirada')">🏠 RETIRADA</button>
      </div>
      <div class="pill-row" id="pagamentoRow">
        <button class="btn-pill" data-forma="dinheiro" onclick="selecionarPagamento('dinheiro')">💵 DINHEIRO</button>
        <button class="btn-pill" data-forma="pix" onclick="selecionarPagamento('pix')">📱 PIX</button>
        <button class="btn-pill" data-forma="cartao" onclick="selecionarPagamento('cartao')">💳 CARTÃO</button>
      </div>
      <button class="btn-imprimir-footer" id="btnImprimirFooter"
        onclick="imprimirCupom()" disabled>
        🖨 IMPRIMIR CUPOM
      </button>
    </div>
  </div>

</div>

<!-- DRAWER BURGER -->
<div class="pdv-overlay" id="pdvOverlay" onclick="fecharDrawerBurger()"></div>
<div class="pdv-drawer" id="pdvDrawer">
  <div class="pdv-drawer-handle"></div>
  <div class="pdv-drawer-header">
    <div class="pdv-drawer-nome" id="pdvDrawerNome"></div>
    <button class="pdv-drawer-close" onclick="fecharDrawerBurger()">✕</button>
  </div>
  <div class="pdv-drawer-body" id="pdvDrawerBody"></div>
  <div class="pdv-drawer-footer">
    <div class="pdv-total-wrap">
      <span class="pdv-total-label">TOTAL DO ITEM</span>
      <span class="pdv-total-val" id="pdvTotalItem">R$ 0,00</span>
    </div>
    <button class="btn-pdv-confirmar" id="btnPdvConfirmar" onclick="confirmarDrawerAtivo()" disabled>🔥 ADICIONAR</button>
  </div>
</div>

<!-- ÁREA DE IMPRESSÃO — só fica visível durante a impressão (@media print) -->
<pre id="printArea"></pre>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
