<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0E0906"/>
  <title>PDV — Desmantelo's Burguer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'"/>
  <noscript><link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;800&display=swap"/></noscript>

  <style>
    /* ── TOKENS ── */
    :root{
      --red:#C41A1A;--red-dark:#8B0000;
      --yellow:#F5A623;--gold:#D4880A;
      --black:#0E0906;--surface:#1C1510;--surface2:#2A1F18;
      --border:#3A2E26;--border2:#4A3C32;
      --cream:#F5EDD8;--cream2:#EDE0C4;
      --green:#2d6a1f;--green2:#3a8a28;
      --white:#FFFDF7;
      --text:#E8D9C4;--text2:#A89880;
      --radius:8px;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%;-webkit-text-size-adjust:100%}
    body{
      font-family:'Nunito',system-ui,sans-serif;
      background:var(--black);color:var(--text);
      height:100%;overflow:hidden;
      display:flex;flex-direction:column;
    }

    /* ── TOPBAR ── */
    .topbar{
      background:var(--surface);
      border-bottom:2px solid var(--border);
      padding:8px 14px;
      display:flex;align-items:center;gap:10px;
      flex-shrink:0;
    }
    .topbar-logo{
      font-family:'Bebas Neue',cursive;
      font-size:1rem;letter-spacing:2px;
      color:var(--yellow);line-height:1;
    }
    .topbar-logo span{color:var(--red);font-size:.7rem;display:block;letter-spacing:1px;}
    .topbar-divider{width:1px;height:28px;background:var(--border2);flex-shrink:0;}
    .cliente-wrap{flex:1;display:flex;align-items:center;gap:8px;}
    .cliente-label{
      font-family:'Bebas Neue',cursive;font-size:.75rem;
      letter-spacing:2px;color:var(--text2);white-space:nowrap;
    }
    .cliente-input{
      flex:1;max-width:200px;
      background:var(--surface2);border:1.5px solid var(--border2);
      border-radius:6px;padding:5px 10px;
      font-family:'Nunito',sans-serif;font-size:.82rem;
      color:var(--text);outline:none;
      transition:border-color .12s;
    }
    .cliente-input::placeholder{color:var(--text2);}
    .cliente-input:focus{border-color:var(--yellow);}
    .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .topbar-total{
      font-family:'Bebas Neue',cursive;font-size:1.1rem;
      color:var(--yellow);white-space:nowrap;
    }
    .topbar-count{
      font-family:'Bebas Neue',cursive;font-size:.7rem;
      color:var(--text2);letter-spacing:1px;
    }
    .btn-imprimir{
      background:var(--green);color:#fff;
      border:2px solid var(--green2);border-radius:var(--radius);
      padding:7px 14px;font-family:'Bebas Neue',cursive;
      font-size:.9rem;letter-spacing:2px;cursor:pointer;
      white-space:nowrap;
      -webkit-tap-highlight-color:transparent;
      transition:background .12s,opacity .12s;
    }
    .btn-imprimir:hover{background:var(--green2);}
    .btn-imprimir:disabled{opacity:.4;cursor:not-allowed;}
    .btn-imprimir:active{opacity:.8;}
    .btn-novo-pedido{
      background:none;border:1.5px solid var(--border2);
      border-radius:var(--radius);padding:7px 12px;
      font-family:'Bebas Neue',cursive;font-size:.85rem;
      letter-spacing:1px;color:var(--text2);cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      transition:border-color .12s,color .12s;
    }
    .btn-novo-pedido:hover{border-color:var(--red);color:var(--red);}

    /* ── LAYOUT ── */
    .layout{
      flex:1;display:flex;overflow:hidden;
      min-height:0;
    }

    /* ── PAINEL ESQUERDO — PRODUTOS ── */
    .produtos-panel{
      flex:1;display:flex;flex-direction:column;
      overflow:hidden;border-right:2px solid var(--border);
    }

    /* abas de categoria */
    .cat-tabs{
      display:flex;overflow-x:auto;scrollbar-width:none;
      background:var(--surface);border-bottom:2px solid var(--border);
      flex-shrink:0;
    }
    .cat-tabs::-webkit-scrollbar{display:none;}
    .cat-tab{
      flex-shrink:0;background:none;border:none;
      font-family:'Bebas Neue',cursive;font-size:.85rem;
      letter-spacing:2px;color:var(--text2);
      padding:10px 16px;cursor:pointer;
      border-bottom:3px solid transparent;margin-bottom:-2px;
      -webkit-tap-highlight-color:transparent;
      transition:color .12s,border-color .12s;
    }
    .cat-tab.active,.cat-tab:hover{color:var(--yellow);border-bottom-color:var(--yellow);}

    /* busca rápida */
    .search-bar{
      padding:8px 12px;background:var(--surface);
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .search-input{
      width:100%;background:var(--surface2);
      border:1.5px solid var(--border2);border-radius:6px;
      padding:6px 10px;font-family:'Nunito',sans-serif;
      font-size:.82rem;color:var(--text);outline:none;
      transition:border-color .12s;
    }
    .search-input::placeholder{color:var(--text2);}
    .search-input:focus{border-color:var(--yellow);}

    /* lista de produtos */
    .produtos-list{
      flex:1;overflow-y:auto;padding:8px;
      scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
    }
    .produtos-list::-webkit-scrollbar{width:4px;}
    .produtos-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

    /* item de produto */
    .produto-item{
      display:flex;align-items:center;gap:10px;
      padding:9px 10px;border-radius:var(--radius);
      border:1.5px solid var(--border);
      background:var(--surface);
      margin-bottom:6px;
      transition:border-color .1s,background .1s;
    }
    .produto-item:hover{border-color:var(--border2);background:var(--surface2);}
    .produto-info{flex:1;min-width:0;}
    .produto-nome{
      font-family:'Bebas Neue',cursive;font-size:.95rem;
      letter-spacing:1px;color:var(--cream);line-height:1;
    }
    .produto-detalhe{
      font-size:.7rem;color:var(--text2);
      margin-top:2px;line-height:1.3;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .produto-preco{
      font-family:'Bebas Neue',cursive;font-size:1rem;
      color:var(--yellow);white-space:nowrap;flex-shrink:0;
    }
    .btn-add-item{
      background:var(--red);color:var(--yellow);
      border:1.5px solid var(--red-dark);border-radius:6px;
      width:32px;height:32px;font-size:1.2rem;font-weight:800;
      cursor:pointer;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      transition:background .1s,transform .08s;
    }
    .btn-add-item:hover{background:var(--red-dark);}
    .btn-add-item:active{transform:scale(.9);}

    /* sub-header de categoria */
    .cat-label{
      font-family:'Bebas Neue',cursive;font-size:.75rem;
      letter-spacing:3px;color:var(--text2);
      padding:10px 4px 4px;
      border-bottom:1px solid var(--border);
      margin-bottom:6px;
    }

    /* ── PAINEL DIREITO — PEDIDO ── */
    .pedido-panel{
      width:280px;flex-shrink:0;
      display:flex;flex-direction:column;
      overflow:hidden;
    }

    .pedido-header{
      padding:10px 14px;
      background:var(--surface);
      border-bottom:2px solid var(--border);
      flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
    }
    .pedido-title{
      font-family:'Bebas Neue',cursive;font-size:1rem;
      letter-spacing:2px;color:var(--cream);
    }
    .btn-limpar-pedido{
      background:none;border:none;color:var(--text2);
      font-size:.68rem;cursor:pointer;text-decoration:underline;
      font-family:'Nunito',sans-serif;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-limpar-pedido:hover{color:var(--red);}

    .pedido-items{
      flex:1;overflow-y:auto;padding:8px;
      scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
    }
    .pedido-items::-webkit-scrollbar{width:4px;}
    .pedido-items::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

    .pedido-vazio{
      text-align:center;padding:40px 20px;
      color:var(--text2);font-size:.8rem;line-height:1.6;
    }
    .pedido-vazio-icon{font-size:2rem;margin-bottom:8px;display:block;opacity:.4;}

    /* item no pedido */
    .pedido-item{
      display:flex;align-items:flex-start;gap:8px;
      padding:8px 0;
      border-bottom:1px solid var(--border);
    }
    .pedido-item:last-child{border-bottom:none;}
    .pedido-item-info{flex:1;min-width:0;}
    .pedido-item-nome{
      font-family:'Bebas Neue',cursive;font-size:.88rem;
      letter-spacing:1px;color:var(--cream);line-height:1;
    }
    .pedido-item-detalhe{
      font-size:.68rem;color:var(--text2);margin-top:2px;line-height:1.3;
    }
    .pedido-item-preco{
      font-family:'Bebas Neue',cursive;font-size:.88rem;
      color:var(--yellow);white-space:nowrap;flex-shrink:0;
    }
    .btn-rem{
      background:none;border:none;color:var(--border2);
      font-size:.8rem;cursor:pointer;padding:0;flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
      transition:color .1s;line-height:1;margin-top:2px;
    }
    .btn-rem:hover{color:var(--red);}

    /* qty control inline no pedido */
    .qty-ctrl{
      display:flex;align-items:center;gap:4px;margin-top:4px;
    }
    .btn-qty{
      background:var(--surface2);border:1px solid var(--border2);
      border-radius:4px;width:22px;height:22px;
      font-size:.85rem;font-weight:800;
      color:var(--text);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      transition:background .1s;
    }
    .btn-qty:hover{background:var(--border2);}
    .qty-num{
      font-family:'Bebas Neue',cursive;font-size:.9rem;
      color:var(--cream);min-width:18px;text-align:center;
    }

    /* footer do pedido */
    .pedido-footer{
      padding:10px 14px;
      background:var(--surface);
      border-top:2px solid var(--border);
      flex-shrink:0;
    }
    .pedido-subtotais{margin-bottom:8px;}
    .pedido-linha{
      display:flex;justify-content:space-between;
      font-size:.75rem;color:var(--text2);margin-bottom:3px;
    }
    .pedido-total-linha{
      display:flex;justify-content:space-between;
      align-items:baseline;
      border-top:1px solid var(--border2);padding-top:6px;margin-top:4px;
    }
    .pedido-total-label{
      font-family:'Bebas Neue',cursive;font-size:.9rem;
      letter-spacing:2px;color:var(--cream);
    }
    .pedido-total-valor{
      font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--yellow);
    }
    .btn-imprimir-footer{
      display:block;width:100%;margin-top:10px;
      padding:11px;background:var(--green);color:#fff;
      border:2px solid var(--green2);border-radius:var(--radius);
      font-family:'Bebas Neue',cursive;font-size:1rem;
      letter-spacing:3px;cursor:pointer;
      transition:background .12s,opacity .12s;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-imprimir-footer:hover{background:var(--green2);}
    .btn-imprimir-footer:disabled{opacity:.4;cursor:not-allowed;}

    /* ── OVERLAY DE IMPRESSÃO ── */
    .print-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.8);
      z-index:200;display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .2s;
    }
    .print-overlay.open{opacity:1;pointer-events:all;}
    .print-modal{
      background:var(--surface);border:2px solid var(--yellow);
      border-radius:12px;padding:24px;width:min(360px,92vw);
      display:flex;flex-direction:column;gap:14px;
    }
    .print-modal-title{
      font-family:'Bebas Neue',cursive;font-size:1.2rem;
      letter-spacing:2px;color:var(--yellow);text-align:center;
    }
    .print-preview{
      background:var(--black);border:1px solid var(--border2);
      border-radius:6px;padding:12px;
      font-family:'Courier New',monospace;font-size:.72rem;
      color:var(--cream);line-height:1.5;white-space:pre;
      overflow-x:auto;max-height:260px;overflow-y:auto;
    }
    .print-actions{display:flex;gap:8px;}
    .btn-conectar{
      flex:1;padding:10px;background:var(--surface2);
      border:2px solid var(--border2);border-radius:var(--radius);
      font-family:'Bebas Neue',cursive;font-size:.9rem;
      letter-spacing:2px;color:var(--text);cursor:pointer;
      transition:border-color .12s,color .12s;
    }
    .btn-conectar:hover{border-color:var(--yellow);color:var(--yellow);}
    .btn-imprimir-confirm{
      flex:1;padding:10px;background:var(--green);
      border:2px solid var(--green2);border-radius:var(--radius);
      font-family:'Bebas Neue',cursive;font-size:.9rem;
      letter-spacing:2px;color:#fff;cursor:pointer;
      transition:background .12s;
    }
    .btn-imprimir-confirm:hover{background:var(--green2);}
    .btn-fechar-modal{
      background:none;border:none;color:var(--text2);
      font-size:.7rem;cursor:pointer;text-align:center;
      text-decoration:underline;font-family:'Nunito',sans-serif;
    }
    .status-bt{
      font-size:.72rem;color:var(--text2);text-align:center;
      font-family:'Nunito',sans-serif;min-height:16px;
    }
    .status-bt.ok{color:#4caf50;}
    .status-bt.erro{color:var(--red);}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:80px;left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--surface2);color:var(--yellow);
      border:1.5px solid var(--border2);
      padding:7px 16px;border-radius:20px;
      font-family:'Bebas Neue',cursive;font-size:.85rem;letter-spacing:1px;
      z-index:300;white-space:nowrap;pointer-events:none;opacity:0;
      transition:opacity .2s,transform .2s;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ── MOBILE ── */
    @media(max-width:600px){
      body{overflow:auto;}
      .layout{flex-direction:column;overflow:visible;}
      .produtos-panel{border-right:none;border-bottom:2px solid var(--border);}
      .pedido-panel{width:100%;}
      .topbar{flex-wrap:wrap;gap:6px;}
      .cliente-input{max-width:100%;}
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">
    PDV
    <span>DESMANTELO'S BURGUER</span>
  </div>
  <div class="topbar-divider"></div>
  <div class="cliente-wrap">
    <span class="cliente-label">CLIENTE</span>
    <input class="cliente-input" id="clienteInput" type="text"
      placeholder="Mesa, nome ou nº do pedido…" autocomplete="off"/>
  </div>
  <div class="topbar-right">
    <div>
      <div class="topbar-total" id="topbarTotal">R$ 0,00</div>
      <div class="topbar-count" id="topbarCount">0 ITENS</div>
    </div>
    <button class="btn-novo-pedido" onclick="novoPedido()">🗑 NOVO</button>
    <button class="btn-imprimir" id="btnImprimirTop" onclick="abrirImpressao()" disabled>
      🖨 IMPRIMIR
    </button>
  </div>
</div>

<!-- LAYOUT PRINCIPAL -->
<div class="layout">

  <!-- PRODUTOS -->
  <div class="produtos-panel">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="search-bar">
      <input class="search-input" id="searchInput" type="search"
        placeholder="Buscar item…" autocomplete="off" oninput="filtrar(this.value)"/>
    </div>
    <div class="produtos-list" id="produtosList"></div>
  </div>

  <!-- PEDIDO -->
  <div class="pedido-panel">
    <div class="pedido-header">
      <span class="pedido-title">🧾 PEDIDO</span>
      <button class="btn-limpar-pedido" onclick="novoPedido()">limpar tudo</button>
    </div>
    <div class="pedido-items" id="pedidoItems">
      <div class="pedido-vazio" id="pedidoVazio">
        <span class="pedido-vazio-icon">🧾</span>
        Nenhum item ainda.<br/>Toque em + para adicionar.
      </div>
    </div>
    <div class="pedido-footer">
      <div class="pedido-subtotais" id="pedidoSubtotais"></div>
      <div class="pedido-total-linha">
        <span class="pedido-total-label">TOTAL</span>
        <span class="pedido-total-valor" id="pedidoTotal">R$ 0,00</span>
      </div>
      <button class="btn-imprimir-footer" id="btnImprimirFooter"
        onclick="abrirImpressao()" disabled>
        🖨 IMPRIMIR CUPOM
      </button>
    </div>
  </div>

</div>

<!-- OVERLAY IMPRESSÃO -->
<div class="print-overlay" id="printOverlay">
  <div class="print-modal">
    <div class="print-modal-title">🖨 PRÉVIA DO CUPOM</div>
    <div class="print-preview" id="printPreview"></div>
    <div class="status-bt" id="statusBt">Impressora não conectada</div>
    <div class="print-actions">
      <button class="btn-conectar" onclick="conectarBluetooth()">📶 CONECTAR</button>
      <button class="btn-imprimir-confirm" onclick="imprimirCupom()">IMPRIMIR</button>
    </div>
    <button class="btn-fechar-modal" onclick="fecharImpressao()">cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   ⚙️  DADOS — substitua por import ../cardapio.js
       quando a estrutura de pastas for criada
   ═══════════════════════════════════════════ */

const CARDAPIO=[

const COMBOS=[
  {id:"c1", nome:"Combo Lampião e Maria Bonita", preco:59.99, detalhe:"2 Lampião + Batata G + Refri 1L"},
  {id:"c2", nome:"Combo Cangaceiros",            preco:96.99, detalhe:"4 Arretado + Batata GG + Refri 2L"},
];

const BATATAS=[
  {id:"bf-p", nome:"Batata Frita P",        preco:7.00,  detalhe:"Batata frita"},

  {id:"bt-m", nome:"Batata Turbinada M",    preco:12.00, detalhe:"Batata + cheddar + farofa bacon"},
  {id:"bt-g", nome:"Batata Turbinada G",    preco:20.00, detalhe:"Batata + cheddar + farofa bacon"},
];

const BEBIDAS=[
  {id:"b1", nome:"Refrigerante lata",    preco:6.00},
  {id:"b2", nome:"Refrigerante 250ml",   preco:4.00},
  {id:"b3", nome:"Antartica 1L",         preco:10.00},
  {id:"b4", nome:"Coca-Cola 1L",         preco:12.00},
  {id:"b5", nome:"Água",                preco:2.00},
  {id:"b6", nome:"Água c/ gás",          preco:4.00},
  {id:"b7", nome:"H²O Limoneto",         preco:6.00},
  {id:"b8", nome:"Schweppes",            preco:6.00},
];

/* categorias para as abas */
const CATEGORIAS=[
  {id:"burgers",  label:"🍔 BURGERS",  itens:()=>CARDAPIO.map(b=>({
      id:`burger-${b.id}-burger`, nome:b.nome,
      preco:b.preco.burger, detalhe:b.descricao,
      variantes:[
        {label:"Só o burger",              preco:b.preco.burger},
        {label:"+ Refri lata",             preco:b.preco.combo},
        {label:"+ Refri lata + Batata P",  preco:b.preco.completo},
      ]
    }))
  },
  {id:"combos",   label:"🔥 COMBOS",   itens:()=>COMBOS.map(c=>({id:c.id,nome:c.nome,preco:c.preco,detalhe:c.detalhe}))},
  {id:"batatas",  label:"🍟 BATATAS",  itens:()=>BATATAS.map(b=>({id:b.id,nome:b.nome,preco:b.preco,detalhe:b.detalhe}))},
  {id:"bebidas",  label:"🥤 BEBIDAS",  itens:()=>BEBIDAS.map(b=>({id:b.id,nome:b.nome,preco:b.preco,detalhe:""}))},
  {id:"adicionais",label:"➕ ADICIONAIS",itens:()=>ADICIONAIS.map(a=>({id:`add-${a.id}`,nome:a.nome,preco:a.preco,detalhe:"Adicional avulso"}))},
];

/* ═══════════════════════════════════════════
   🛒  ESTADO
   ═══════════════════════════════════════════ */
let pedido=[]; // [{uid, id, nome, preco, detalhe, qty}]
let catAtiva="burgers";
let btDevice=null;
let btChar=null;

/* ═══════════════════════════════════════════
   🖼️  RENDER
   ═══════════════════════════════════════════ */
function fmt(v){return "R$ "+v.toFixed(2).replace(".",",")}
function fmtN(v){return v.toFixed(2).replace(".",",")}

function renderAbas(){
  const tabs=document.getElementById("catTabs");
  tabs.innerHTML=CATEGORIAS.map(c=>`
    <button class="cat-tab${c.id===catAtiva?" active":""}"
      onclick="trocarCat('${c.id}')">${c.label}
    </button>`).join("");
}

function trocarCat(id){
  catAtiva=id;
  renderAbas();
  document.getElementById("searchInput").value="";
  renderProdutos();
}

function renderProdutos(filtro=""){
  const cat=CATEGORIAS.find(c=>c.id===catAtiva);
  let itens=cat.itens();
  if(filtro){
    const q=filtro.toLowerCase();
    itens=itens.filter(i=>i.nome.toLowerCase().includes(q)||i.detalhe?.toLowerCase().includes(q));
  }
  const list=document.getElementById("produtosList");
  if(!itens.length){
    list.innerHTML=`<div style="padding:24px;text-align:center;color:var(--text2);font-size:.8rem;">Nenhum item encontrado.</div>`;
    return;
  }
  const frag=document.createDocumentFragment();

  // burgers: mostrar variantes inline
  if(catAtiva==="burgers"&&!filtro){
    CARDAPIO.forEach(b=>{
      const label=document.createElement("div");
      label.className="cat-label";
      label.textContent=b.nome.toUpperCase();
      frag.appendChild(label);

      b.preco&&[
        {label:"Só o burger",             preco:b.preco.burger, id:`burger-${b.id}-0`},
        {label:"+ Refri lata",            preco:b.preco.combo,  id:`burger-${b.id}-1`},
        {label:"+ Refri lata + Batata P", preco:b.preco.completo,id:`burger-${b.id}-2`},
      ].forEach(v=>{
        frag.appendChild(criarItemEl({
          id:v.id, nome:v.label, preco:v.preco,
          detalhe:b.descricao, _burgerId:b.id
        }));
      });
    });
  } else {
    itens.forEach(i=>frag.appendChild(criarItemEl(i)));
  }
  list.innerHTML="";
  list.appendChild(frag);
}

function criarItemEl(item){
  const div=document.createElement("div");
  div.className="produto-item";
  div.innerHTML=`
    <div class="produto-info">
      <div class="produto-nome">${item.nome}</div>
      ${item.detalhe?`<div class="produto-detalhe">${item.detalhe}</div>`:""}
    </div>
    <div class="produto-preco">${fmt(item.preco)}</div>
    <button class="btn-add-item" onclick='adicionarItem(${JSON.stringify(item)})'>+</button>`;
  return div;
}

function filtrar(v){renderProdutos(v);}

/* ═══════════════════════════════════════════
   ➕  ADICIONAR / REMOVER
   ═══════════════════════════════════════════ */
function adicionarItem(item){
  // tenta incrementar se já existe item igual
  const existe=pedido.find(p=>p.id===item.id);
  if(existe){
    existe.qty++;
    existe.preco_total=existe.preco*existe.qty;
  } else {
    pedido.push({
      uid:Date.now()+Math.random(),
      id:item.id,
      nome:item.nome,
      preco:item.preco,
      preco_total:item.preco,
      detalhe:item.detalhe||"",
      qty:1
    });
  }
  renderPedido();
  showToast(`${item.nome} ✓`);
}

function alterarQty(uid,delta){
  const item=pedido.find(p=>p.uid==uid);
  if(!item)return;
  item.qty+=delta;
  if(item.qty<=0){
    pedido=pedido.filter(p=>p.uid!=uid);
  } else {
    item.preco_total=item.preco*item.qty;
  }
  renderPedido();
}

function removerItem(uid){
  pedido=pedido.filter(p=>p.uid!=uid);
  renderPedido();
}

function novoPedido(){
  pedido=[];
  document.getElementById("clienteInput").value="";
  renderPedido();
}

/* ═══════════════════════════════════════════
   🧾  RENDER PEDIDO
   ═══════════════════════════════════════════ */
function renderPedido(){
  const container=document.getElementById("pedidoItems");
  const vazio=document.getElementById("pedidoVazio");
  const total=pedido.reduce((s,i)=>s+i.preco_total,0);

  // botões imprimir
  const temItens=pedido.length>0;
  document.getElementById("btnImprimirTop").disabled=!temItens;
  document.getElementById("btnImprimirFooter").disabled=!temItens;

  // topbar
  const qtdTotal=pedido.reduce((s,i)=>s+i.qty,0);
  document.getElementById("topbarTotal").textContent=fmt(total);
  document.getElementById("topbarCount").textContent=`${qtdTotal} ${qtdTotal===1?"ITEM":"ITENS"}`;
  document.getElementById("pedidoTotal").textContent=fmt(total);

  if(!pedido.length){
    container.innerHTML="";
    container.appendChild(document.getElementById("pedidoVazio")||criarVazio());
    vazio&&(vazio.style.display="");
    document.getElementById("pedidoSubtotais").innerHTML="";
    return;
  }
  vazio&&(vazio.style.display="none");

  const frag=document.createDocumentFragment();
  pedido.forEach(item=>{
    const div=document.createElement("div");
    div.className="pedido-item";
    div.innerHTML=`
      <div class="pedido-item-info">
        <div class="pedido-item-nome">${item.nome}${item.qty>1?` ×${item.qty}`:""}</div>
        ${item.detalhe?`<div class="pedido-item-detalhe">${item.detalhe}</div>`:""}
        <div class="qty-ctrl">
          <button class="btn-qty" onclick="alterarQty(${item.uid},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="btn-qty" onclick="alterarQty(${item.uid},1)">+</button>
        </div>
      </div>
      <div class="pedido-item-preco">${fmt(item.preco_total)}</div>
      <button class="btn-rem" onclick="removerItem(${item.uid})" title="Remover">✕</button>`;
    frag.appendChild(div);
  });
  container.innerHTML="";
  container.appendChild(frag);

  // subtotais por categoria
  const sub=document.getElementById("pedidoSubtotais");
  const cats={burgers:0,combos:0,batatas:0,bebidas:0,outros:0};
  pedido.forEach(i=>{
    if(i.id.startsWith("burger"))cats.burgers+=i.preco_total;
    else if(i.id.startsWith("c"))cats.combos+=i.preco_total;
    else if(i.id.startsWith("bf")||i.id.startsWith("bt"))cats.batatas+=i.preco_total;
    else if(i.id.startsWith("b"))cats.bebidas+=i.preco_total;
    else cats.outros+=i.preco_total;
  });
  sub.innerHTML=Object.entries(cats)
    .filter(([,v])=>v>0)
    .map(([k,v])=>`
      <div class="pedido-linha">
        <span>${{burgers:"🍔 Burgers",combos:"🔥 Combos",batatas:"🍟 Batatas",bebidas:"🥤 Bebidas",outros:"➕ Outros"}[k]}</span>
        <span>R$ ${fmtN(v)}</span>
      </div>`).join("");
}

/* ═══════════════════════════════════════════
   🖨️  IMPRESSÃO
   ═══════════════════════════════════════════ */
function gerarCupom(){
  const cliente=document.getElementById("clienteInput").value.trim();
  const agora=new Date();
  const dia=agora.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"});
  const hora=agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  const L=32; // largura em colunas
  const linha="-".repeat(L);
  const centro=(s)=>{const p=Math.max(0,Math.floor((L-s.length)/2));return " ".repeat(p)+s;};
  const lr=(l,r)=>{const sp=Math.max(1,L-l.length-r.length);return l+" ".repeat(sp)+r;};

  let c="";
  c+=centro("DESMANTELO'S BURGUER")+"\n";
  c+=centro("Hamburguer Artesanal na Brasa")+"\n";
  c+=centro("(81) 9.8669-0346")+"\n";
  c+=linha+"\n";
  c+=centro(`${dia}  ${hora}`)+"\n";
  if(cliente) c+=centro(`Cliente: ${cliente}`)+"\n";
  c+=linha+"\n";

  pedido.forEach(i=>{
    const nome=i.qty>1?`${i.qty}x ${i.nome}`:`1x ${i.nome}`;
    const preco=`R$ ${fmtN(i.preco_total)}`;
    // quebra nome longo
    if(nome.length+preco.length+1<=L){
      c+=lr(nome,preco)+"\n";
    } else {
      c+=nome+"\n";
      c+=" ".repeat(L-preco.length)+preco+"\n";
    }
    if(i.detalhe){
      // trunca detalhe em 30 chars
      const det=i.detalhe.length>28?"   "+i.detalhe.substring(0,28)+"…":"   "+i.detalhe;
      c+=det+"\n";
    }
  });

  c+=linha+"\n";
  const total=pedido.reduce((s,i)=>s+i.preco_total,0);
  c+=lr("TOTAL","R$ "+fmtN(total))+"\n";
  c+=linha+"\n";
  c+=centro("Obrigado pela preferencia!")+"\n";
  c+=centro("@desmantelosburguer")+"\n";
  return c;
}

function abrirImpressao(){
  if(!pedido.length)return;
  document.getElementById("printPreview").textContent=gerarCupom();
  document.getElementById("printOverlay").classList.add("open");
  atualizarStatusBt();
}

function fecharImpressao(){
  document.getElementById("printOverlay").classList.remove("open");
}

function atualizarStatusBt(){
  const el=document.getElementById("statusBt");
  if(!navigator.bluetooth){
    el.textContent="Web Bluetooth não suportado neste navegador.";
    el.className="status-bt erro";
  } else if(btChar){
    el.textContent="✓ Impressora conectada — pronta para imprimir.";
    el.className="status-bt ok";
  } else {
    el.textContent="Impressora não conectada. Clique em Conectar.";
    el.className="status-bt";
  }
}

async function conectarBluetooth(){
  const el=document.getElementById("statusBt");
  if(!navigator.bluetooth){
    el.textContent="Web Bluetooth não suportado. Use Chrome no Android.";
    el.className="status-bt erro";
    return;
  }
  try {
    el.textContent="Buscando impressora…";
    el.className="status-bt";
    btDevice=await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:["000018f0-0000-1000-8000-00805f9b34fb"]
    });
    const server=await btDevice.gatt.connect();
    const service=await server.getPrimaryService("000018f0-0000-1000-8000-00805f9b34fb");
    btChar=await service.getCharacteristic("00002af1-0000-1000-8000-00805f9b34fb");
    el.textContent=`✓ Conectado: ${btDevice.name||"Impressora"}`;
    el.className="status-bt ok";
  } catch(e){
    el.textContent=`Erro: ${e.message}`;
    el.className="status-bt erro";
    btChar=null;
  }
}

async function imprimirCupom(){
  const cupom=gerarCupom();
  if(!btChar){
    // fallback: impressão pelo navegador
    const win=window.open("","_blank","width=400,height=600");
    win.document.write(`<pre style="font-family:monospace;font-size:12px;padding:10px">${cupom}</pre>`);
    win.document.close();
    win.print();
    fecharImpressao();
    return;
  }
  try {
    const encoder=new TextEncoder();
    // ESC/POS: init + texto + corte parcial
    const init=new Uint8Array([0x1B,0x40]);          // ESC @  (inicializa)
    const cut =new Uint8Array([0x1D,0x56,0x01]);      // GS V 1 (corte parcial)
    const texto=encoder.encode(cupom+"\n\n\n");
    const payload=new Uint8Array(init.length+texto.length+cut.length);
    payload.set(init,0);
    payload.set(texto,init.length);
    payload.set(cut,init.length+texto.length);
    // envia em chunks de 512 bytes (limite BLE)
    const CHUNK=512;
    for(let i=0;i<payload.length;i+=CHUNK){
      await btChar.writeValueWithoutResponse(payload.slice(i,i+CHUNK));
    }
    fecharImpressao();
    showToast("Cupom enviado para a impressora ✓");
  } catch(e){
    document.getElementById("statusBt").textContent=`Erro ao imprimir: ${e.message}`;
    document.getElementById("statusBt").className="status-bt erro";
  }
}

/* ═══════════════════════════════════════════
   🍞  TOAST
   ═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

/* INIT */
renderAbas();
renderProdutos();
renderPedido();
</script>
